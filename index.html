<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NASA | LUNAR ARCHIVE EXPLORER</title>
    <style>
        :root { --nasa: #00ff41; --bg: rgba(0, 10, 0, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 10; cursor: grab; }
        #panorama { position: absolute; width: 100%; height: 100%; z-index: 5; display: none; background: #000; overflow: hidden; cursor: grab; user-select: none; }
        #lunar-img { height: 100%; width: auto; display: block; position: absolute; top: 0; left: 50%; transform-origin: center center; will-change: transform; pointer-events: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; color: var(--nasa); pointer-events: none; }
        .btn { background: var(--bg); color: var(--nasa); border: 1px solid var(--nasa); padding: 10px 20px; cursor: pointer; pointer-events: auto; display: none; margin-top: 10px; font-family: inherit; }
        #data-box { position: absolute; bottom: 30px; right: 30px; z-index: 100; background: var(--bg); padding: 20px; border-left: 4px solid var(--nasa); display: none; color: var(--nasa); }
        
        .mission-label { 
            color: var(--nasa); 
            background: rgba(0, 0, 0, 0.85); 
            padding: 8px 16px; 
            border: 1px solid var(--nasa); 
            font-size: 14px; 
            white-space: nowrap; 
            pointer-events: auto; 
            cursor: pointer;
        }
        .mission-label:hover { background: var(--nasa); color: #000; }

        /* Stile fisso in alto al centro */
        .mission-label.fixed-top {
            position: fixed !important;
            top: 40px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 9999;
            pointer-events: none;
        }

        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 8px;
            background: var(--nasa);
            cursor: pointer;
        }
        #zoom-slider::-moz-range-thumb {
            width: 16px;
            height: 8px;
            background: var(--nasa);
            cursor: pointer;
            border: none;
        }
        
        #panorama-menu {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            background: var(--bg);
            padding: 0;
            border-left: 4px solid var(--nasa);
            display: none;
            color: var(--nasa);
        }
        
        #panorama-menu-toggle {
            background: var(--bg);
            color: var(--nasa);
            border: 1px solid var(--nasa);
            padding: 12px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #panorama-menu-toggle:hover {
            background: var(--nasa);
            color: #000;
        }
        
        #panorama-menu.open #panorama-menu-toggle::after {
            content: '▲';
        }
        
        #panorama-menu-toggle::after {
            content: '▼';
            font-size: 12px;
            margin-left: 8px;
        }
        
        #panorama-items {
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        #panorama-menu.open #panorama-items {
            display: block;
        }
        
        .panorama-item {
            padding: 10px 16px;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }
        
        .panorama-item:hover {
            background: rgba(0, 255, 65, 0.2);
        }
        
        .panorama-item.active {
            background: var(--nasa);
            color: #000;
            font-weight: bold;
        }
        
        .panorama-item::before {
            content: attr(data-idx);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .panorama-item.active::before {
            background: rgba(0, 0, 0, 0.3);
        }
        .lunar-hotspot {
            position: absolute;
            background: rgba(0, 10, 0, 0.85);
            color: var(--nasa);
            border: 1px solid var(--nasa);
            padding: 4px 8px;
            font-family: inherit;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: auto;
            transform: translate(-50%, -50%);
            cursor: help;
        }
        .lunar-hotspot::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -6px;
            transform: translateY(-50%);
            border-width: 4px 6px 4px 0;
            border-style: solid;
            border-color: transparent var(--nasa) transparent transparent;
        }
    </style>
</head>
<body>
    <div id="zoom-container" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--nasa); font-family: inherit; pointer-events: auto;">
        <span style="font-size: 14px; font-weight: bold;">+</span>
        <input type="range" id="zoom-slider" min="-18.0" max="-5.2" step="0.1" value="-18.0" style="writing-mode: vertical-lr; direction: rtl; width: 8px; height: 200px; -webkit-appearance: none; background: rgba(0, 255, 65, 0.2); border: 1px solid var(--nasa); outline: none; cursor: pointer;">
        <span style="font-size: 14px; font-weight: bold;">-</span>
    </div>

    <div id="ui">
        <div style="font-weight: bold; letter-spacing: 2px;">LUNAR_ARCHIVE_EXPLORER // SCAN_MODE</div>
        <button id="back-btn" class="btn" onclick="exitStreetView()">RETURN TO ORBIT</button>
    </div>

    <div id="canvas-container"></div>
    <div id="panorama">
        <div id="panorama-wrapper" style="position: absolute; height: 100%; top: 0; left: 50%; transform-origin: center center; will-change: transform;">
            <img id="lunar-img" src="" alt="Lunar Surface" style="position: relative; height: 100%; width: auto; display: block; left: 0; transform: none; pointer-events: none;">
            <div id="hotspot-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
        </div>
    </div>
    <div id="data-box"><div id="d-id">---</div><div id="d-coords">---</div></div>
    <div id="panorama-menu">
        <div id="panorama-menu-toggle">EXPLORE LOCATIONS</div>
        <div id="panorama-items"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
        // --- PARAMETRI DI CONTROLLO ---
        const ZOOM_LEVEL_MISSION = 5.0;  // Distanza ravvicinata
        const ZOOM_THRESHOLD = 5.75;      // Soglia cambio modalità (Orbita -> Superficie)
        const REAPPEAR_MARGIN = 0.2;     // Quanta distanza serve per far ricomparire le etichette
        // ------------------------------

        let scene, camera, renderer, labelRenderer, moon, raycaster, mouse;
        let landingSites = [], missionGroups = [];
        let isDragging = false, lastInteraction = Date.now(), prevMouse = {x:0, y:0};
        let targetZ = 18;

        let isAutoRotating = false;
        let targetRotation = { x: 0, y: 0 };
        let activeLabel = null; 

        let imgPos = 0, imgScale = 1, velocity = 0, isImgDragging = false, lastMouseX = 0;
        const friction = 0.94;
        
        let allMissions = []; 
        let currentMissionId = null; 

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 18;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none'; 
            document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

            const moonTex = new THREE.TextureLoader().load('moon.jpg');
            moon = new THREE.Mesh(new THREE.SphereGeometry(4, 64, 64), new THREE.MeshPhongMaterial({map: moonTex, shininess:0}));
            moon.rotation.y = -Math.PI/2; 
            scene.add(moon);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(8, 6, 8);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            try {
                const res = await fetch('config.json');
                const data = await res.json();
                allMissions = data.missioni; 
                setupMissions(data.missioni);
            } catch(e) { console.error("Config missing"); }

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('wheel', onWheel, {passive: false});
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
  
            // Controllo dello slider di zoom (Invertito)
            const slider = document.getElementById('zoom-slider');
            slider.addEventListener('input', (e) => {
                // Il meno davanti inverte il valore negativo dello slider in positivo per Three.js
                targetZ = -parseFloat(e.target.value); 
                isAutoRotating = false;
                lastInteraction = Date.now();
            });

            animate();
        }

        function setupMissions(missions) {
            const groups = {};
            
            // --- CONFIGURAZIONE DISPERSIONE (Modifica questi valori per distanziare) ---
            const GOLDEN_ANGLE = 2.39996; 
            const DISTANCE_FACTOR = 0.6;  // Raggio di crescita della spirale ad ogni passo
            const MIN_RADIUS = 0.3;       // Distanza minima dal centro dell'allunaggio per il primo punto
            // -------------------------------------------------------------------------

            // Manteniamo un contatore separato per OGNI missione per far funzionare la spirale ovunque
            const missionCounters = {};

            missions.forEach((m) => {
                const missionID = m.id.toUpperCase();
                
                // Se è la prima volta che incontriamo questa missione, inizializziamo il suo contatore a 0
                if (missionCounters[missionID] === undefined) {
                    missionCounters[missionID] = 0;
                }
                
                // 'n' rappresenta l'indice della foto dentro la SUA specifica missione
                const n = missionCounters[missionID];
                missionCounters[missionID]++; // Incrementiamo per la prossima foto della stessa missione

                // Calcolo della spirale di Fermat locale
                const angle = n * GOLDEN_ANGLE;
                const radius = MIN_RADIUS + (DISTANCE_FACTOR * Math.sqrt(n));

                // Spostamento diretto in gradi sferici (Latitudine e Longitudine)
                // Usiamo il coseno e il seno dell'angolo moltiplicati per il raggio della spirale
                const finalLat = m.lat + (radius * Math.cos(angle));
                const finalLon = m.lon + (radius * Math.sin(angle));

                const phi = (90 - finalLat) * (Math.PI / 180);
                const theta = (finalLon + 180) * (Math.PI / 180);
                
                // Creazione del mesh del cerchietto (leggermente più grande per facilitare il clic)
                const disc = new THREE.Mesh(
                    new THREE.CircleGeometry(0.04, 32), 
                    new THREE.MeshBasicMaterial({color: 0x00ff41, side: THREE.DoubleSide})
                );
                
                disc.position.set(-(4.02 * Math.sin(phi) * Math.cos(theta)), 4.02 * Math.cos(phi), 4.02 * Math.sin(phi) * Math.sin(theta));
                disc.lookAt(0,0,0);
                disc.userData = m;
                disc.visible = true; 
                moon.add(disc);
                landingSites.push(disc);

                // Configurazione dell'ancora per il testone di testo (es. "APOLLO 15")
                // Lo teniamo fisso sulle coordinate base del sito di allunaggio (quando n era 0)
                if(!groups[missionID]) {
                    const basePhi = (90 - m.lat) * (Math.PI / 180);
                    const baseTheta = (m.lon + 180) * (Math.PI / 180);
                    groups[missionID] = { phi: basePhi, theta: baseTheta, name: missionID };
                }
            });

            // Generazione dei cartelli delle missioni
            for(let id in groups) {
                const g = groups[id];
                const div = document.createElement('div');
                div.className = 'mission-label';
                div.textContent = g.name;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    activeLabel = div;
                    isAutoRotating = true;
                    
                    moon.rotation.y %= Math.PI * 2;
                    moon.rotation.x %= Math.PI * 2;
                    targetRotation.y = -g.theta + Math.PI/2;
                    targetRotation.x = -(g.phi - Math.PI/2);

                    if (moon.rotation.y - targetRotation.y > Math.PI) targetRotation.y += Math.PI * 2;
                    if (moon.rotation.y - targetRotation.y < -Math.PI) targetRotation.y -= Math.PI * 2;

                    targetZ = ZOOM_LEVEL_MISSION; 
                    lastInteraction = Date.now();
                };

                const lbl = new THREE.CSS2DObject(div);
                lbl.labelDiv = div; 
                lbl.position.set(-(4.1 * Math.sin(g.phi) * Math.cos(g.theta)), 4.1 * Math.cos(g.phi), 4.1 * Math.sin(g.phi) * Math.sin(g.theta));
                moon.add(lbl);
                missionGroups.push(lbl);
            }
        }

        function onMouseDown(e) {
            if(document.getElementById('panorama').style.display === 'block') { isImgDragging = true; lastMouseX = e.clientX; velocity = 0; }
            else { isDragging = true; isAutoRotating = false; prevMouse = {x: e.clientX, y: e.clientY}; }
        }

        function onMouseUp() { isDragging = false; isImgDragging = false; }

        function onMouseMove(e) {
            if(isDragging && document.getElementById('canvas-container').style.display !== 'none') {
                const sens = 0.0012 * (camera.position.z / 18); 
                moon.rotation.y += (e.clientX - prevMouse.x) * sens;
                moon.rotation.x += (e.clientY - prevMouse.y) * sens;
                lastInteraction = Date.now();
            }
            if(isImgDragging) {
                const deltaX = e.clientX - lastMouseX;
                velocity = deltaX; imgPos += deltaX; lastMouseX = e.clientX;
                updateImgTransform();
            }
            prevMouse = {x: e.clientX, y: e.clientY};
        }

        function onWheel(e) {
            if (document.getElementById('panorama').style.display === 'block') {
                e.preventDefault();
                imgScale = Math.min(Math.max(imgScale - e.deltaY * 0.001, 1), 5);
                updateImgTransform();
            } else {
                // Sostituisci questa riga per limitare lo zoom tra 4.2 e 18.0
                targetZ = Math.min(Math.max(camera.position.z + e.deltaY * 0.012, 4.2), 18.0);
                isAutoRotating = false;
                lastInteraction = Date.now();
            }
        }

        function updateImgTransform() {
            const wrapper = document.getElementById('panorama-wrapper');
            const img = document.getElementById('lunar-img');
            const containerWidth = window.innerWidth;
            
            const renderedWidth = img.getBoundingClientRect().width;
            const limit = (renderedWidth - containerWidth) / 2;
            
            if (renderedWidth > containerWidth) { 
                imgPos = Math.min(Math.max(imgPos, -limit), limit); 
            } else { 
                imgPos = 0; 
            }
            
            wrapper.style.transform = `translateX(calc(-50% + ${imgPos}px)) scale(${imgScale})`;
        }

        function onClick(e) {
            if(document.getElementById('panorama').style.display === 'block') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if(camera.position.z < ZOOM_THRESHOLD) {
                const hits = raycaster.intersectObjects(landingSites.filter(s => s.visible));
                if(hits.length > 0) enterStreetView(hits[0].object.userData);
            }
        }

        function enterStreetView(cfg) {
            document.getElementById('canvas-container').style.display = 'none';
            document.getElementById('panorama').style.display = 'block';
            document.getElementById('zoom-container').style.display = 'none';
            
            // Garantisce la visibilità del pulsante in qualsiasi scenario di caricamento panoramica
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('data-box').style.display = 'block';
            
            const imgEl = document.getElementById('lunar-img');
            const overlayEl = document.getElementById('hotspot-overlay');
            
            overlayEl.innerHTML = '';
            
            const fileName = cfg.file.replace('photosphere/', '');
            const missionNum = fileName.split('_')[0];
            imgEl.src = `photosphere/Apollo ${missionNum}/${fileName}`;
            
            imgEl.onload = () => { 
                imgPos = 0; 
                imgScale = 1; 
                velocity = 0; 
                updateImgTransform(); 
                
                if (cfg.hotSpots && cfg.hotSpots.length > 0) {
                    const naturalW = imgEl.naturalWidth;
                    const naturalH = imgEl.naturalHeight;
                    
                    cfg.hotSpots.forEach(hs => {
                        const spot = document.createElement('div');
                        spot.className = 'lunar-hotspot';
                        spot.innerText = hs.text;
                        
                        const pctX = (hs.x / naturalW) * 100;
                        const pctY = (hs.y / naturalH) * 100;
                        
                        spot.style.left = `${pctX}%`;
                        spot.style.top = `${pctY}%`;
                        
                        overlayEl.appendChild(spot);
                    });
                }
            };
            
            document.getElementById('d-id').innerText = cfg.titolo;
            document.getElementById('d-coords').innerText = `${cfg.lat.toFixed(3)}N / ${cfg.lon.toFixed(3)}E`;
            
            currentMissionId = cfg.id;
            const sameMission = allMissions.filter(m => m.id === cfg.id);
            const menuEl = document.getElementById('panorama-menu');
            const itemsContainer = document.getElementById('panorama-items');
            itemsContainer.innerHTML = '';
            
            if(sameMission.length > 1) {
                menuEl.style.display = 'block';
                document.getElementById('panorama-menu-toggle').onclick = () => {
                    menuEl.classList.toggle('open');
                };
                
                sameMission.forEach((mission, idx) => {
                    const item = document.createElement('div');
                    item.className = 'panorama-item';
                    item.setAttribute('data-idx', idx + 1);
                    if(mission.file === cfg.file) item.classList.add('active');
                    item.textContent = mission.titolo.substring(mission.titolo.lastIndexOf('-') + 1).trim() || `Location ${idx + 1}`;
                    item.onclick = () => {
                        enterStreetView(mission);
                        menuEl.classList.remove('open');
                    };
                    itemsContainer.appendChild(item);
                });
            } else {
                menuEl.style.display = 'none';
            }
        }

        function exitStreetView() {
            document.getElementById('panorama').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('data-box').style.display = 'none';
            document.getElementById('panorama-menu').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';
            document.getElementById('zoom-container').style.display = 'flex';
            currentMissionId = null;
            targetZ = 18.0; 
            document.getElementById('zoom-slider').value = -18.0;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

      

        function animate() {
            requestAnimationFrame(animate);
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            document.getElementById('zoom-slider').value = -camera.position.z;
            
            if(isAutoRotating) {
                moon.rotation.y += (targetRotation.y - moon.rotation.y) * 0.08;
                moon.rotation.x += (targetRotation.x - moon.rotation.x) * 0.08;
                if(Math.abs(moon.rotation.y - targetRotation.y) < 0.001) isAutoRotating = false;
            }

            const isNear = camera.position.z < ZOOM_THRESHOLD;
            // Gestione visibilità: i singoli punti rimangono sempre visibili
            landingSites.forEach(s => s.visible = true);
            
            missionGroups.forEach(g => {
                const el = g.labelDiv;
                const isThisActive = (el === activeLabel);

                // --- CALCOLO DELLA VISIBILITÀ DIETRO LA LUNA ---
                // 1. Otteniamo la posizione globale dell'etichetta nello spazio 3D
                const labelWorldPosition = new THREE.Vector3();
                g.getWorldPosition(labelWorldPosition);

                // 2. Calcoliamo il vettore che va dalla telecamera verso l'etichetta
                const cameraDirection = new THREE.Vector3();
                camera.getWorldDirection(cameraDirection);

                // 3. Il Prodotto Scalare ci dice se l'etichetta è rivolta verso la camera
                // Sfruttiamo il vettore normalizzato della posizione rispetto al centro della luna
                const dotProduct = labelWorldPosition.clone().normalize().dot(cameraDirection);
                
                // Se il dotProduct è maggiore di -0.2, l'etichetta sta andando sul retro della sfera
                const isBehind = dotProduct > -0.2; 
                // -----------------------------------------------

                if (isNear && activeLabel) {
                    if (isThisActive) {
                        el.classList.add('fixed-top');
                        el.style.opacity = '1';
                    } else {
                        el.classList.remove('fixed-top');
                        el.style.opacity = '0';
                    }
                } else {
                    el.classList.remove('fixed-top');
                    
                    // Se la missione è dietro, applichiamo la trasparenza (es. opacity 0.15)
                    // Altrimenti torna visibile al 100%
                    if (isBehind) {
                        el.style.opacity = '0.15';
                        el.style.pointerEvents = 'none'; // Impedisce di cliccarla per errore sul retro
                    } else {
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                    }

                    if(!isAutoRotating && !isNear) {
                        activeLabel = null;
                    }
                }
            });

            if(!isImgDragging && Math.abs(velocity) > 0.1) {
                imgPos += velocity; velocity *= friction; updateImgTransform();
            }

            if(!isDragging && !isAutoRotating && Date.now() - lastInteraction > 15000) moon.rotation.y += 0.0003;
            
            labelRenderer.render(scene, camera);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
