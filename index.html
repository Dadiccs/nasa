<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NASA | Lunar Archive Explorer</title>
    <style>
        :root { --nasa: #00ff41; --bg: rgba(0, 10, 0, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #canvas-container { position: absolute; width: 100%; height: 100%; z-index: 10; cursor: grab; }
        #panorama { position: absolute; width: 100%; height: 100%; z-index: 5; display: none; background: #000; overflow: hidden; cursor: grab; user-select: none; }
        #lunar-img { height: 100%; width: auto; display: block; position: absolute; top: 0; left: 50%; transform-origin: center center; will-change: transform; pointer-events: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; color: var(--nasa); pointer-events: none; }
        .btn { background: var(--bg); color: var(--nasa); border: 1px solid var(--nasa); padding: 10px 20px; cursor: pointer; pointer-events: auto; display: none; margin-top: 10px; font-family: inherit; }
        #data-box { position: absolute; bottom: 30px; right: 30px; z-index: 100; background: var(--bg); padding: 20px; border-left: 4px solid var(--nasa); display: none; color: var(--nasa); }
        
        .mission-label { 
            color: var(--nasa); 
            background: rgba(0, 0, 0, 0.85); 
            padding: 8px 16px; 
            border: 1px solid var(--nasa); 
            font-size: 14px; 
            white-space: nowrap; 
            pointer-events: auto; 
            cursor: pointer;
        }
        .mission-label:hover { background: var(--nasa); color: #000; }

        /* Stile fisso in alto al centro */
        .mission-label.fixed-top {
            position: fixed !important;
            top: 40px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 9999;
            pointer-events: none;
        }
        
        #panorama-menu {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            background: var(--bg);
            padding: 0;
            border-left: 4px solid var(--nasa);
            display: none;
            color: var(--nasa);
        }
        
        #panorama-menu-toggle {
            background: var(--bg);
            color: var(--nasa);
            border: 1px solid var(--nasa);
            padding: 12px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #panorama-menu-toggle:hover {
            background: var(--nasa);
            color: #000;
        }
        
        #panorama-menu.open #panorama-menu-toggle::after {
            content: '▲';
        }
        
        #panorama-menu-toggle::after {
            content: '▼';
            font-size: 12px;
            margin-left: 8px;
        }
        
        #panorama-items {
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        #panorama-menu.open #panorama-items {
            display: block;
        }
        
        .panorama-item {
            padding: 10px 16px;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }
        
        .panorama-item:hover {
            background: rgba(0, 255, 65, 0.2);
        }
        
        .panorama-item.active {
            background: var(--nasa);
            color: #000;
            font-weight: bold;
        }
        
        .panorama-item::before {
            content: attr(data-idx);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .panorama-item.active::before {
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-weight: bold; letter-spacing: 2px;">LUNAR_RECON_SYSTEM // SCAN_MODE</div>
        <button id="back-btn" class="btn" onclick="exitStreetView()">RETURN TO ORBIT</button>
    </div>

    <div id="canvas-container"></div>
    <div id="panorama"><img id="lunar-img" src="" alt="Lunar Surface"></div>
    <div id="data-box"><div id="d-id">---</div><div id="d-coords">---</div></div>
    <div id="panorama-menu">
        <div id="panorama-menu-toggle">EXPLORE LOCATIONS</div>
        <div id="panorama-items"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script>
        // --- PARAMETRI DI CONTROLLO ---
        const ZOOM_LEVEL_MISSION = 5.0;  // Distanza ravvicinata
        const ZOOM_THRESHOLD = 5.75;      // Soglia cambio modalità (Orbita -> Superficie)
        const REAPPEAR_MARGIN = 0.2;     // Quanta distanza serve per far ricomparire le etichette (più basso = più veloce)
        // ------------------------------

        let scene, camera, renderer, labelRenderer, moon, raycaster, mouse;
        let landingSites = [], missionGroups = [];
        let isDragging = false, lastInteraction = Date.now(), prevMouse = {x:0, y:0};
        let targetZ = 18;

        let isAutoRotating = false;
        let targetRotation = { x: 0, y: 0 };
        let activeLabel = null; // Memorizza l'elemento DOM dell'etichetta cliccata

        let imgPos = 0, imgScale = 1, velocity = 0, isImgDragging = false, lastMouseX = 0;
        const friction = 0.94;
        
        let allMissions = []; // Memorizza tutti i dati delle missioni
        let currentMissionId = null; // Missione attualmente visualizzata

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 18;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none'; 
            document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

            const moonTex = new THREE.TextureLoader().load('moon.jpg');
            moon = new THREE.Mesh(new THREE.SphereGeometry(4, 64, 64), new THREE.MeshPhongMaterial({map: moonTex, shininess:0}));
            moon.rotation.y = -Math.PI/2; 
            scene.add(moon);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(8, 6, 8);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            try {
                const res = await fetch('config.json');
                const data = await res.json();
                allMissions = data.missioni; // Salva i dati globalmente
                setupMissions(data.missioni);
            } catch(e) { console.error("Config missing"); }

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('wheel', onWheel, {passive: false});
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function setupMissions(missions) {
            const groups = {};
            missions.forEach(m => {
                const phi = (90 - m.lat) * (Math.PI / 180);
                const theta = (m.lon + 180) * (Math.PI / 180);
                
                const disc = new THREE.Mesh(new THREE.CircleGeometry(0.025, 32), new THREE.MeshBasicMaterial({color: 0x00ff41, side: THREE.DoubleSide}));
                disc.position.set(-(4.02 * Math.sin(phi) * Math.cos(theta)), 4.02 * Math.cos(phi), 4.02 * Math.sin(phi) * Math.sin(theta));
                disc.lookAt(0,0,0);
                disc.userData = m;
                disc.visible = false;
                moon.add(disc);
                landingSites.push(disc);

                const groupID = m.id.toUpperCase();
                if(!groups[groupID]) groups[groupID] = { phi, theta, name: groupID };
            });

            for(let id in groups) {
                const g = groups[id];
                const div = document.createElement('div');
                div.className = 'mission-label';
                div.textContent = g.name;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    activeLabel = div;
                    isAutoRotating = true;
                    
                    moon.rotation.y %= Math.PI * 2;
                    moon.rotation.x %= Math.PI * 2;
                    targetRotation.y = -g.theta + Math.PI/2;
                    targetRotation.x = -(g.phi - Math.PI/2);

                    console.log(`Clicked: ${g.name}, phi: ${g.phi}, theta: ${g.theta}, targetX: ${targetRotation.x}, targetY: ${targetRotation.y}`);

                    if (moon.rotation.y - targetRotation.y > Math.PI) targetRotation.y += Math.PI * 2;
                    if (moon.rotation.y - targetRotation.y < -Math.PI) targetRotation.y -= Math.PI * 2;

                    targetZ = ZOOM_LEVEL_MISSION; 
                    lastInteraction = Date.now();
                };

                const lbl = new THREE.CSS2DObject(div);
                lbl.labelDiv = div; // Salva il riferimento al div
                lbl.position.set(-(4.1 * Math.sin(g.phi) * Math.cos(g.theta)), 4.1 * Math.cos(g.phi), 4.1 * Math.sin(g.phi) * Math.sin(g.theta));
                moon.add(lbl);
                missionGroups.push(lbl);
            }
        }

        function onMouseDown(e) {
            if(document.getElementById('panorama').style.display === 'block') { isImgDragging = true; lastMouseX = e.clientX; velocity = 0; }
            else { isDragging = true; isAutoRotating = false; prevMouse = {x: e.clientX, y: e.clientY}; }
        }

        function onMouseUp() { isDragging = false; isImgDragging = false; }

        function onMouseMove(e) {
            if(isDragging && document.getElementById('canvas-container').style.display !== 'none') {
                const sens = 0.0012 * (camera.position.z / 18); 
                moon.rotation.y += (e.clientX - prevMouse.x) * sens;
                moon.rotation.x += (e.clientY - prevMouse.y) * sens;
                lastInteraction = Date.now();
            }
            if(isImgDragging) {
                const deltaX = e.clientX - lastMouseX;
                velocity = deltaX; imgPos += deltaX; lastMouseX = e.clientX;
                updateImgTransform();
            }
            prevMouse = {x: e.clientX, y: e.clientY};
        }

        function onWheel(e) {
            if (document.getElementById('panorama').style.display === 'block') {
                e.preventDefault();
                imgScale = Math.min(Math.max(imgScale - e.deltaY * 0.001, 1), 5);
                updateImgTransform();
            } else {
                targetZ = Math.min(Math.max(camera.position.z + e.deltaY * 0.012, 4.0), 25);
                isAutoRotating = false;
                lastInteraction = Date.now();
            }
        }

        function updateImgTransform() {
            const el = document.getElementById('lunar-img');
            const containerWidth = window.innerWidth;
            const renderedWidth = el.getBoundingClientRect().width;
            const limit = (renderedWidth - containerWidth) / 2;
            if (renderedWidth > containerWidth) { imgPos = Math.min(Math.max(imgPos, -limit), limit); }
            else { imgPos = 0; }
            el.style.transform = `translateX(calc(-50% + ${imgPos}px)) scale(${imgScale})`;
        }

        function onClick(e) {
            if(document.getElementById('panorama').style.display === 'block') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if(camera.position.z < ZOOM_THRESHOLD) {
                const hits = raycaster.intersectObjects(landingSites.filter(s => s.visible));
                if(hits.length > 0) enterStreetView(hits[0].object.userData);
            }
        }

        function enterStreetView(cfg) {
            document.getElementById('canvas-container').style.display = 'none';
            document.getElementById('panorama').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('data-box').style.display = 'block';
            const imgEl = document.getElementById('lunar-img');
            imgEl.src = cfg.file;
            imgEl.onload = () => { imgPos = 0; imgScale = 1; velocity = 0; updateImgTransform(); };
            document.getElementById('d-id').innerText = cfg.titolo;
            document.getElementById('d-coords').innerText = `${cfg.lat.toFixed(3)}N / ${cfg.lon.toFixed(3)}E`;
            
            // Popola il menu con le altre panoramiche della stessa missione
            currentMissionId = cfg.id;
            const sameMission = allMissions.filter(m => m.id === cfg.id);
            const menuEl = document.getElementById('panorama-menu');
            const itemsContainer = document.getElementById('panorama-items');
            itemsContainer.innerHTML = '';
            
            if(sameMission.length > 1) {
                menuEl.style.display = 'block';
                // Aggiungi click handler al toggle
                document.getElementById('panorama-menu-toggle').onclick = () => {
                    menuEl.classList.toggle('open');
                };
                
                sameMission.forEach((mission, idx) => {
                    const item = document.createElement('div');
                    item.className = 'panorama-item';
                    item.setAttribute('data-idx', idx + 1);
                    if(mission.file === cfg.file) item.classList.add('active');
                    item.textContent = mission.titolo.substring(mission.titolo.lastIndexOf('-') + 1).trim() || `Location ${idx + 1}`;
                    item.onclick = () => {
                        enterStreetView(mission);
                        menuEl.classList.remove('open'); // Chiudi il menu dopo la selezione
                    };
                    itemsContainer.appendChild(item);
                });
            } else {
                menuEl.style.display = 'none';
            }
        }

        function exitStreetView() {
            document.getElementById('panorama').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('data-box').style.display = 'none';
            document.getElementById('panorama-menu').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';
            currentMissionId = null;
            targetZ = 18; // Torna alla visualizzazione completa della luna
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            

            if(isAutoRotating) {
                moon.rotation.y += (targetRotation.y - moon.rotation.y) * 0.08;
                moon.rotation.x += (targetRotation.x - moon.rotation.x) * 0.08;
                if(Math.abs(moon.rotation.y - targetRotation.y) < 0.001) isAutoRotating = false;
            }

            const isNear = camera.position.z < ZOOM_THRESHOLD;
            landingSites.forEach(s => s.visible = isNear);
            
            missionGroups.forEach(g => {
                const el = g.labelDiv;
                const isThisActive = (el === activeLabel);

                if (isNear && activeLabel) {
                    if (isThisActive) {
                        el.classList.add('fixed-top');
                        el.style.opacity = '1';
                    } else {
                        el.classList.remove('fixed-top');
                        el.style.opacity = '0';
                    }
                } else {
                    // Rimuovi fixed-top quando esci dalla zona di zoom
                    el.classList.remove('fixed-top');
                    el.style.opacity = '1';
                    // Resetta activeLabel solo quando hai finito di auto-rotare E sei uscito dalla zona
                    if(!isAutoRotating && !isNear) {
                        activeLabel = null;
                    }
                }
            });

            if(!isImgDragging && Math.abs(velocity) > 0.1) {
                imgPos += velocity; velocity *= friction; updateImgTransform();
            }

            if(!isDragging && !isAutoRotating && Date.now() - lastInteraction > 15000) moon.rotation.y += 0.0003;
            
            labelRenderer.render(scene, camera);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
